<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Activity Overview</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=work-overview-11">
    <script src="config.example.js?v=work-overview-11"></script>
    <script type="module" src="app.js?v=work-overview-11"></script>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow" id="workingDayLabel">Last week</p>
                <h1>Team Activity Overview</h1>
            </div>
            <div class="topbar-actions">
                <label class="field compact-field">
                    <span>View</span>
                    <select id="viewSelect">
                        <option value="work-overview">Work Overview</option>
                        <option value="time-logs">Time Logs</option>
                    </select>
                </label>
                <div class="freshness" id="freshnessLabel">Not loaded yet</div>
                <button class="secondary-button is-hidden" id="settingsButton" type="button">Settings</button>
                <button class="refresh-button" id="refreshButton" type="button">Refresh</button>
            </div>
        </header>

        <section class="notice is-hidden" id="globalNotice" aria-live="polite"></section>

        <section class="period-panel" id="periodPanel" aria-label="Reporting period">
            <label class="field">
                <span>Period</span>
                <select id="periodSelect">
                    <option value="last-week">Last week</option>
                    <option value="last-month">Last month</option>
                    <option value="this-month">This month</option>
                    <option value="custom">Custom range</option>
                </select>
            </label>
            <div class="custom-range is-hidden" id="customRange">
                <label class="field">
                    <span>From</span>
                    <input id="customStart" type="date">
                </label>
                <label class="field">
                    <span>To</span>
                    <input id="customEnd" type="date">
                </label>
                <button class="secondary-button" id="applyRangeButton" type="button">Apply</button>
            </div>
            <div class="period-error is-hidden" id="periodError" aria-live="polite"></div>
        </section>

        <section class="work-controls is-hidden" id="workControls" aria-label="Work overview filters">
            <label class="field">
                <span>Selection</span>
                <select id="workScopeMode">
                    <option value="team">Team</option>
                    <option value="users">Users</option>
                </select>
            </label>
            <label class="field is-hidden" id="teamSelectField">
                <span>Team</span>
                <select id="workTeamSelect"></select>
            </label>
            <label class="field is-hidden" id="userSearchField">
                <span>User search</span>
                <input id="workUserSearch" type="search" placeholder="Search users">
            </label>
            <label class="check-row detail-toggle">
                <input id="showDetailedTickets" type="checkbox">
                <span>Show compact view</span>
            </label>
            <div class="user-picker is-hidden" id="workUserPicker"></div>
        </section>

        <section class="settings-panel is-hidden" id="settingsPanel" aria-labelledby="settingsTitle">
            <div class="detail-header">
                <div>
                    <p class="eyebrow">Local JSON config</p>
                    <h2 id="settingsTitle">Team settings</h2>
                </div>
                <div class="settings-header-actions">
                    <button class="secondary-button" id="saveTeamsButton" type="button">Save teams</button>
                    <button class="secondary-button" id="closeSettingsButton" type="button">Close</button>
                </div>
            </div>
            <div class="settings-grid">
                <div>
                    <div class="settings-actions">
                        <input id="newTeamName" type="text" placeholder="New team name">
                        <button class="secondary-button" id="addTeamButton" type="button">Add team</button>
                    </div>
                    <div class="team-settings-list" id="teamSettingsList"></div>
                </div>
                <div>
                    <label class="field">
                        <span>Config JSON</span>
                        <textarea id="teamConfigJson" rows="16" readonly></textarea>
                    </label>
                    <div class="period-error is-hidden" id="settingsError" aria-live="polite"></div>
                </div>
            </div>
        </section>

        <section class="summary-strip" id="timeSummaryStrip" aria-label="Activity status summary">
            <button class="summary-tile is-selected" type="button" data-status-filter="all">
                <span class="summary-value" id="countAll">0</span>
                <span class="summary-label">All</span>
            </button>
            <button class="summary-tile" type="button" data-status-filter="active">
                <span class="summary-value" id="countActive">0</span>
                <span class="summary-label">Active</span>
            </button>
            <button class="summary-tile" type="button" data-status-filter="recently-active">
                <span class="summary-value" id="countRecent">0</span>
                <span class="summary-label">Recent</span>
            </button>
            <button class="summary-tile" type="button" data-status-filter="inactive-period">
                <span class="summary-value" id="countInactive">0</span>
                <span class="summary-label">Inactive</span>
            </button>
            <button class="summary-tile" type="button" data-status-filter="needs-attention">
                <span class="summary-value" id="countAttention">0</span>
                <span class="summary-label">Attention</span>
            </button>
        </section>

        <section class="summary-strip work-summary-strip is-hidden" id="workSummaryStrip" aria-label="Work overview summary">
            <div class="summary-tile">
                <span class="summary-value" id="workTicketCount">0</span>
                <span class="summary-label">Working tickets</span>
            </div>
            <div class="summary-tile">
                <span class="summary-value" id="workActivePeopleCount">0</span>
                <span class="summary-label">Active people</span>
            </div>
            <div class="summary-tile">
                <span class="summary-value" id="workSelectedPeopleCount">0</span>
                <span class="summary-label">Selected people</span>
            </div>
            <div class="summary-tile">
                <span class="summary-value" id="workExcludedCount">0</span>
                <span class="summary-label">New/on hold</span>
            </div>
        </section>

        <section class="board" id="teamBoard" aria-label="Team activity board"></section>
        <section class="work-board is-hidden" id="workBoard" aria-label="Work overview board"></section>

        <section class="empty-state is-hidden" id="emptyState">
            <h2>No team members configured</h2>
            <p>Add selected Redmine users to <code>config.local.js</code> or update <code>config.example.js</code>.</p>
        </section>

        <section class="detail-panel is-hidden" id="detailPanel" aria-labelledby="detailTitle">
            <div class="detail-header">
                <div>
                    <p class="eyebrow" id="detailPeriod">Selected period</p>
                    <h2 id="detailTitle">Member detail</h2>
                </div>
                <button class="secondary-button" id="closeDetailButton" type="button">Close</button>
            </div>
            <div class="detail-summary" id="detailSummary"></div>
            <div class="detailRows" id="detailRows"></div>
        </section>
    </main>
</body>
</html>
